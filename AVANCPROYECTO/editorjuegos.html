<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Catálogo - SEGA</title>
    <link rel="stylesheet" href="../sega-frontend/src/styles/styles.css">
    <link rel="stylesheet" href="../sega-frontend/src/styles/paginas.css">
    <link rel="stylesheet" href="../sega-frontend/src/styles/gestores.css">
</head>

<body class="game-body editorjuegos admin-body">

<!-- ================= HEADER ================= -->
<header class="header-game">
  <div class="menu sega">
    <a href="../index.html" class="logo">
      <img src="../IMGS/SEGALOGO2.png" alt="Logo SEGA">
    </a>

    <div class="menu-toggle">☰</div>

    <nav class="navbar">
      <ul>
        <li class="user-menu">
          <button id="login-btn" class="btn-user">Iniciar sesión</button>
          <div id="user-dropdown" class="user-dropdown hidden">
              <button id="logout-btn">Cerrar sesión</button>
              <button id="switch-btn">Cambiar usuario</button>
          </div>
        </li>
        <li><a href="../index.html#inicio">Inicio</a></li>
        <li><a href="../index.html#juegos">Juegos</a></li>
        <li><a href="../index.html#info">Información</a></li>
        <li><a href="../index.html#contacto">Contacto</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- ================= PANEL ================= -->
<div class="panel-container">
  <h1 class="panel-title">Editor de Juegos SEGA</h1>

  <div class="panel-grid">

    <!-- FORMULARIO -->
    <div class="panel-card">
      <form id="form-juego">
        <input type="hidden" id="edit-id">

        <label>Título del Juego:</label>
        <input type="text" id="title" required placeholder="Ej: Sonic Frontiers">

        <label>Género:</label>
        <input type="text" id="genre" required placeholder="Ej: Action, Adventure, RPG">

        <label>Año:</label>
        <input type="number" id="year" required min="1980" max="2099">

        <label>URL Imagen Portada:</label>
        <input type="text" id="image" required>

        <label>Descripción:</label>
        <textarea id="description" rows="3" required></textarea>

        <label>URL Tráiler (YouTube embed):</label>
        <input type="text" id="trailer">

        <label>Sinopsis corta:</label>
        <textarea id="sinopsis" rows="2"></textarea>

        <label>Galería (URLs separadas por coma):</label>
        <textarea id="images" rows="2"></textarea>

        <label>Tiendas (JSON):</label>
        <textarea id="comprar" rows="4"></textarea>

        <button type="submit" class="btn-guardar" id="btn-submit">Agregar Juego</button>
        <button type="button" id="btn-cancelar" style="display:none;">Cancelar Edición</button>
      </form>
    </div>

    <!-- TABLA -->
    <div class="panel-card">
      <table class="tabla-juegos">
          <thead>
              <tr>
                  <th>Imagen</th>
                  <th>Título</th>
                  <th>Año</th>
                  <th>Acciones</th>
              </tr>
          </thead>
          <tbody id="lista-juegos-admin"></tbody>
      </table>
    </div>

  </div>
</div>

<a href="../ACT_2/salaadmin.html" class="btn-volver">⬅</a>

<script>
// ================= MENU RESPONSIVE =================
document.querySelector('.menu-toggle')
  .addEventListener('click', () => {
    document.querySelector('.navbar').classList.toggle('active');
  });

// ================= AUTENTICACIÓN =================
const loggedUser = JSON.parse(localStorage.getItem("loggedUser"));

if (!loggedUser) {
    alert("Debes iniciar sesión");
    window.location.href = "../AVANCPROYECTO/login.html";
}

if (loggedUser.role !== "admin") {
    alert("No tienes permisos para entrar aquí");
    window.location.href = "../index.html";
}

const loginBtn = document.getElementById("login-btn");
const dropdown = document.getElementById("user-dropdown");
const logoutBtn = document.getElementById("logout-btn");
const switchBtn = document.getElementById("switch-btn");

loginBtn.textContent = loggedUser.username;

loginBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    dropdown.classList.toggle("hidden");
});

logoutBtn.addEventListener("click", () => {
    localStorage.removeItem("loggedUser");
    window.location.href = "../AVANCPROYECTO/login.html";
});

switchBtn.addEventListener("click", () => {
    localStorage.removeItem("loggedUser");
    window.location.href = "../AVANCPROYECTO/login.html";
});

document.addEventListener("click", () => {
    dropdown.classList.add("hidden");
});

// ================= API =================
const API_URL = "http://localhost:3000/api/games";

const form = document.getElementById("form-juego");
const lista = document.getElementById("lista-juegos-admin");
const btnSubmit = document.getElementById("btn-submit");
const btnCancelar = document.getElementById("btn-cancelar");

// Helper seguro
async function fetchSeguro(url, options = {}) {
    const res = await fetch(url, options);

    if (res.status === 401) {
        alert("Sesión expirada");
        localStorage.removeItem("loggedUser");
        window.location.href = "../AVANCPROYECTO/login.html";
        return null;
    }

    if (!res.ok) {
        const error = await res.text();
        throw new Error(error);
    }

    return res.json();
}

// ================= CARGAR JUEGOS =================
async function cargarJuegos() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        lista.innerHTML = "";

        // Detecta automáticamente cómo viene la respuesta
        const juegos = data.results || data.data || data;

        if (!Array.isArray(juegos)) {
            console.error("La respuesta no es un array:", data);
            return;
        }

        juegos.forEach(juego => {
            // Aquí se ajusta la ruta de la imagen
            const imgSrc = juego.image
                ? `../IMGS/juegos/${juego.image}` // Ruta relativa correcta
                : "../IMGS/juegos/SINIMGS.png";   // Imagen por defecto

            lista.innerHTML += `
                <tr>
                    <td><img src="${imgSrc}" width="50" alt="${juego.title}"></td>
                    <td>${juego.title}</td>
                    <td>${juego.year}</td>
                    <td>
                        <button onclick="editarJuego('${juego._id}')">Editar</button>
                        <button onclick="eliminarJuego('${juego._id}')">Eliminar</button>
                    </td>
                </tr>
            `;
        });

    } catch (err) {
        console.error("Error cargando juegos:", err);
        alert("Error cargando juegos");
    }
}

// ================= CREAR / EDITAR =================
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const id = document.getElementById("edit-id").value;

    let comprarData = [];
    try {
        comprarData = JSON.parse(document.getElementById("comprar").value || "[]");
    } catch {
        alert("JSON inválido en Tiendas");
        return;
    }

    const nuevoJuego = {
        title: document.getElementById("title").value.trim(),
        genre: document.getElementById("genre").value.trim(),
        year: Number(document.getElementById("year").value),
        image: document.getElementById("image").value.trim(),
        description: document.getElementById("description").value.trim(),
        trailer: document.getElementById("trailer").value.trim(),
        sinopsis: document.getElementById("sinopsis").value.trim(),
        images: document.getElementById("images").value
            .split(",")
            .map(i => i.trim())
            .filter(i => i !== ""),
        comprar: comprarData
    };

    try {
        await fetchSeguro(
            id ? `${API_URL}/${id}` : API_URL,
            {
                method: id ? "PUT" : "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${loggedUser.token}`
                },
                body: JSON.stringify(nuevoJuego)
            }
        );

        alert(id ? "Juego actualizado" : "Juego agregado");

        form.reset();
        document.getElementById("edit-id").value = "";
        btnSubmit.innerText = "Agregar Juego";
        btnCancelar.style.display = "none";

        cargarJuegos();

    } catch (err) {
        alert("Error guardando juego");
    }
});

// ================= EDITAR =================
window.editarJuego = async (id) => {
    try {
        const data = await fetchSeguro(`${API_URL}/${id}`);
        if (!data) return;

        const juego = data.data;

        document.getElementById("edit-id").value = juego._id;
        document.getElementById("title").value = juego.title;
        document.getElementById("genre").value = juego.genre;
        document.getElementById("year").value = juego.year;
        document.getElementById("image").value = juego.image;
        document.getElementById("description").value = juego.description || "";
        document.getElementById("trailer").value = juego.trailer || "";
        document.getElementById("sinopsis").value = juego.sinopsis || "";
        document.getElementById("images").value = (juego.images || []).join(", ");
        document.getElementById("comprar").value =
            JSON.stringify(juego.comprar || [], null, 2);

        btnSubmit.innerText = "Actualizar Juego";
        btnCancelar.style.display = "inline-block";

    } catch {
        alert("Error cargando juego");
    }
};

// ================= CANCELAR =================
btnCancelar.addEventListener("click", () => {
    form.reset();
    document.getElementById("edit-id").value = "";
    btnSubmit.innerText = "Agregar Juego";
    btnCancelar.style.display = "none";
});

// ================= ELIMINAR =================
window.eliminarJuego = async (id) => {
    if (!confirm("¿Eliminar juego?")) return;

    try {
        await fetchSeguro(`${API_URL}/${id}`, {
            method: "DELETE",
            headers: {
                "Authorization": `Bearer ${loggedUser.token}`
            }
        });

        alert("Juego eliminado");
        cargarJuegos();

    } catch {
        alert("Error eliminando juego");
    }
};

cargarJuegos();
</script>

</body>
</html>

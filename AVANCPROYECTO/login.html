<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEGA Login | Sonic Access</title>
    <link rel="stylesheet" href="../sega-frontend/src/styles/styles.css">
    <link rel="stylesheet" href="../sega-frontend/src/styles/paginas.css">
    <style>
        .oauth-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-direction: column;
        }

        .oauth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border: 2px solid;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .oauth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 179, 255, 0.3);
        }

        .google-btn {
            background: #fff;
            color: #3c4043;
            border-color: #dadce0;
        }

        .google-btn:hover {
            background: #f8f9fa;
        }

        .microsoft-btn {
            background: #fff;
            color: #00a4ef;
            border-color: #00a4ef;
        }

        .microsoft-btn:hover {
            background: #f3f3f3;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
            font-size: 12px;
            color: #999;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #333;
        }

        .divider span {
            position: relative;
            background: #0b1c3d;
            padding: 0 10px;
        }

        .oauth-icons {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
    </style>
</head>
<body class="sonic-login">

    <div class="login-container">
        <a href="../index.html" class="logo-link">
            <img src="../IMGS/SEGALOGO2.png" alt="SEGA Logo" class="sega-logo">
        </a>
        <h2 class="sonic-subtitle">Sonic Access System</h2>

        <!-- Login Tradicional -->
        <form id="login-form">

            <div class="input-group">
                <label>PLAYER ID</label>
                <input type="text" name="username" placeholder="Ej. sonic" required>
            </div>
            
            <div class="input-group">
                <label>CHAOS CODE</label>
                <input type="password" name="password" placeholder="rings123" required>
            </div>
            
            <button type="submit" class="start-btn">▶ PRESS START</button>

        </form>

        <!-- Divisor -->
        <div class="divider">
            <span>O usar tus redes sociales</span>
        </div>

        <!-- OAuth Buttons -->
        <div class="oauth-buttons">
            <button id="google-btn" class="oauth-btn google-btn" type="button">
                <span class="oauth-icons">🔵</span>
                Continuar con Google
            </button>
            <button id="microsoft-btn" class="oauth-btn microsoft-btn" type="button">
                <span class="oauth-icons">⬜</span>
                Continuar con Microsoft
            </button>
        </div>

        <div class="footer">
            © SEGA UNIVERSE | DGM17076 PROJECT <br>
            Powered by Speed ⚡🦔
        </div>
    </div>
    
    <script src="login.js" defer></script>

</body>
</html>
